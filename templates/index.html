  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "__TITLE__",
    "description": "__DESCRIPTION__",
    "mainEntity": {
      "@type": "ItemList",
      "itemListElement": [
        {

<body class="theme-light">

  <button id="themeToggle" class="theme-fab">🌙</button>

  <div class="app-container">
    <header class="header">
      <h1 id="mainHeading">Samsung Galaxy F54 Display Complaint Board</h1>
      <p class="description">Public Samsung Community archive of reported display line issues. Select models below to explore.</p>
    </header>

    <div class="stats-bar">
      <div class="stat-pill"><span class="stat-icon">📑</span> <b id="statThreads">0</b> Threads</div>
      <div class="stat-pill"><span class="stat-icon">💬</span> <b id="statReplies">0</b> Replies</div>
      <div class="stat-pill"><span class="stat-icon">👥</span> <b id="statUsers">0</b> Users</div>
      <div class="stat-pill"><span class="stat-icon">👁️</span> <b id="statViews">0</b> Views</div>
    </div>

    <div class="search-container">
      <div class="search-bar-inner">
        <input type="text" id="q" placeholder="Search authors, models, or keywords..." autocomplete="off">
      </div>
    </div>

    <div class="controls-wrapper">
      <div class="filter-row">
        <label class="filter-chip" data-model="">All Models</label>
        <label class="filter-chip" data-model="F54">F54</label>
        <label class="filter-chip" data-model="S22">S22</label>
        <label class="filter-chip" data-model="S23">S23</label>
        <label class="filter-chip" data-model="S24">S24</label>
        <label class="filter-chip" data-model="S25">S25</label>
        <label class="filter-chip" data-model="S26">S26</label>
        <label class="filter-chip" data-model="Z Fold">Z Fold</label>
        <label class="filter-chip" data-model="M Series">M Series</label>
        <label class="filter-chip" data-model="Others">Others</label>
      </div>

      <div class="secondary-filters">
        <select id="topicFilter">
          <option value="">All Topics</option>
        </select>
        <select id="sortBy">
          <option value="recent">Most Recent</option>
          <option value="replies">Most Replies</option>
          <option value="views">Most Views</option>
        </select>
      </div>
    </div>

    <main id="threadList" class="thread-list">
        <!-- Rendered by JS -->
    </main>
  </div>

  <!-- Mobile App Navbar -->
  <nav class="mobile-nav">
    <a href="#" class="nav-item active" onclick="navTo('home')">
      <span class="nav-icon">🏠</span>
      <span>Feed</span>
    </a>
    <a href="#" class="nav-item" onclick="document.getElementById('q').focus()">
      <span class="nav-icon">🔍</span>
      <span>Search</span>
    </a>
    <a href="https://r2.community.samsung.com/" target="_blank" class="nav-item">
      <span class="nav-icon">🏛️</span>
      <span>Community</span>
    </a>
  </nav>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle" style="margin:0; font-size:1rem; line-height: 1.4; flex:1; padding-right:1rem;"> Thread Title</h3>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div id="modalScroll" class="message-scroll">
        <!-- Messages rendered by JS -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
