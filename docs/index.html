21 FE , i have triggered green line issue all of sudden. I plugged my phone for changing and in another 30min i have a green line on my screen.  Also few months back , the back panel has been coming off. I repaired it once from the Samsung services and again its coming off. Has anyone using S21 FE facing the same issues?", "source": "root", "kudos": 10, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16116535", "author": "goodthings", "published": "2024-05-11T09:47:16+00:00", "subject": "Re: Green line issue", "text": "Kindly complaint to Samsung customer support through Samsung Members App as error report also send log files Along with this error report for this issue. Then go to service center for replace/repair it's. If you like please accept as a solution it's help to others users also, click on 3dots in my reply section and click on accept solution. Thanks.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16116582", "author": "GIRI6008", "published": "2024-05-11T09:53:16+00:00", "subject": "Re: Green line issue", "text": "I do also got the same problem.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16121381", "author": "cs_member10", "published": "2024-05-12T04:24:31+00:00", "subject": "Re: Green line issue", "text": "Dear Samsung member,\n Greetings from Samsung customer support.\n As per your query, kindly follow the easy troubleshooting steps which might help to solve the issue.\n Power OFF Galaxy smartphones and turn ON-\nTo power off through Quick settings, swipe down from the top of the screen. Tap the Power icon in the upper right of the screen (next to the Settings icon), and then tap Power off.\n Update device software (If Software update available): https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-smartphone-how-to-update-software/ \n Reset the device: https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-mobile-how-to-perform-a-factory-res ...\n In case the issue still occurs. We request you to kindly visit the service center for a physical inspection of your device. You can locate your nearest service center with this given link: https://www.samsung.com/in/support/service-center/ \n Warm Regards,\nSamsung Customer Support.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16123662", "author": "Xanadu", "published": "2024-05-12T12:23:42+00:00", "subject": "Re: Green line issue", "text": "For users with this issue, sharing my experience. I faced this on my Samsung S22 Ultra. Vertical green line on left hand side all along display\nWent to local service center. They said I have to pay Rs. 14000 for screen replacement.\nDid error report, same response. Have to pay myself.\nMailed service head, same response. I have to pay.\nMy phone is just 2 years 20 days old.\nOne Plus is offering lifetime free replacement for all One Plus phones with this issue but apparently Samsung is too poor to support its loyal customers.\nAll they did was offer a one week screen replacement, as if users issues will appear only in those 7 days.\nBut high end Samsung products at your own risk.\nMy previous Note 9 suffered two screen failures with no physical damage. First time they replaced free but with 3 months warranty only and screen failed again and I paid 13000 to replace screen second time.\nStill I was loyal to Samsung buying S22 Ultra and now they are asking me to pay for the screen for green line issue that One Plus is replacing free for lifetime", "source": "comment", "kudos": 5, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16124267", "author": "railu", "published": "2024-05-12T14:09:27+00:00", "subject": "Re: Green line issue", "text": "If they don't resolve like oneplus, I'm going to the court", "source": "comment", "kudos": 5, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16170677" hor_avatar": null, "url": null}, {"id": "19956041", "author": "faizan28", "published": "2025-06-27T13:55:25+00:00", "subject": "Re: Green line issue", "text": "Hello Sir, my Samsung S22 Ultra phone is facing green line problem and that too after software update. So I immediately took my phone to service center and told them. They said that my phone is more than 3 years old so it will not be available for free replacement. But I told them that Sir it is only 1 month old so I request you to please help me. They refused. So Sir I request you to please help me.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20416660", "author": "prajval_sathe", "published": "2025-08-24T14:51:10+00:00", "subject": "Re: Green line issue", "text": "I am using Samsung z flip 3 mobile. Suddenly a green line appeared on my mobile. Please help me with this.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20435483", "author": "suppor", "published": "2025-08-26T18:59:31+00:00", "subject": "Re: Green line issue", "text": "A green line suddenly appeared on my s23 ultra phone. A black spot appeared on that green line. When I went to the service centre, they refused to take the phone. This is not a good service from Samsung. Please help me.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20445076", "author": "vinu_336", "published": "2025-08-28T03:44:35+00:00", "subject": "Re: Green line issue", "text": "I'm a samsung user since 2020\nNow I use S23 & I have also facing green line issue\nSamsung must solve this problem quickly\nIs there any free screen replacement??", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20900635", "author": "MurasK", "published": "2025-10-23T16:13:54+00:00", "subject": "Re: Green line issue", "text": "Dear Samsung Support Team,\nI am writing to bring to your attention an issue that started occurring on my Samsung Galaxy S22 Ultra immediately after I upgraded to the latest OS / One UI 8 version.\nDevice Details:\nModel: Samsung Galaxy S22 Ultra\nDate of Purchase: October 2022\nIssue: A vertical green line appeared on the display after the recent OS update\nNo physical damage or water exposure\nThe device has always been used with care\nThis problem clearly occurred as a result of the software update, and I am aware that many other Samsung users have reported similar display issues on flagship models after major OS upgrades.\nGiven that this issue is not due to user negligence but appears to be a post-update defect, I kindly request Samsung to provide a free display replacement or a suitable resolution under customer satisfaction or goodwill policy, as this is a widely acknowledged issue.\nI have been a loyal Samsung customer and trust that Samsung will support me in resolving this concern promptly.\nPlease let me know the next steps or required documents so that I can proceed with the service request.\nLooking forward to a quick resolution", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20956787", "author": "NEYAN", "published": "2025-10-31T03:13:16+00:00", "subject": "Re: Green line issue", "text": "Finally the green line issue is resolved. Thank you Samsung!", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21254961", "author": "Aynose", "published": "2025-12-19T06:34:57+00:00", "subject": "Re: Green line issue", "text": "I use samsung F54 , In my phone one green line came but its like coming and going. But now its not going and also many green line is there on the left hand side all along the display.I bought this phone only 1 yr back.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21773180", "author": "abinas14", "published": "2026-03-24T03:13:55+00:00", "subject": "Re: Green line issue", "text": "Till yesterday night when i go to sleep, my phone S23 was ok. But when i woke up in the morning a green line on the middle of the screen have came 😮", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}], "views": 14537}, {"url": "https://r2.community.samsung.com/t5/GalaxyF/Green%20Line%20Issue%20on%20Galaxy%20F54%205G%20%26amp%3B%20Protest%20Against%20Software-Induced%20Defects/td-p/21244907", "domain": "r2.community.samsung.com", "group": "r2.community.samsung.com / GalaxyF", "thread_id": "21244907", "title": "Green Line Issue on Galaxy F54 5G &amp; Protest Against Software-Induced Defects", "topic_group": "Green Line Issue", "fetched_at_utc": "2026-03-26T18:56:59.386139+00:00", "messages": [{"id": "21244907", "author": "LydiaSunny", "published": "2025-12-17T06:39:15+00:00", "subject": "Green Line Issue on Galaxy F54 5G &amp; Protest Against Software-Induced Defects", "text": "I am writing this with deep frustration. My Galaxy F54 5G recently developed the infamous Green Line issue immediately following a software update. When I contacted Samsung, I was told my phone is \"out of warranty\" and that it has been \"used for 2 years.\" Are we now buying Samsung phones with a 2-year expiry date? Samsung is currently providing free screen replacements for this exact issue on the S-series (S21, S22, etc.), even if they are out of warranty. This is a clear admission that the Green Line is a manufacturing or software-induced defect. If the issue is the same, why is there a different rule for F-series users?  * The Issue is the same: A vertical green line caused by an official update.  * The Manufacturer is the same: Samsung.  * The Cause is the same: A buggy software rollout. It is unacceptable to treat F-series customers as \"second-class\" when our money is just as valuable as an S-series customer's. If Samsung cannot provide stable updates, they should not push them to our phones. I demand:  * Equal Treatment: Extend the Free Screen Replacement policy to the F54 5G.  * Accountability: Stop blaming \"warranty\" for a hardware failure caused by your own software. If this is not resolved, I will be forced to take this matter to the National Consumer Helpline (NCH) and look for other legal avenues. A phone should not become e-waste in 2 years because of a brand's update. Model: Galaxy F54 5G Condition: No physical/water damage.", "source": "root", "kudos": 3, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21257649", "author": "Members_TSYn9BW", "published": "2025-12-19T18:22:02+00:00", "subject": "Re: Green Line Issue on Galaxy F54 5G &amp; Protest Against Software-Induced Defects", "text": "I was also facing the same issue in the same phone and after that the touch screen also got damaged. After going to Samsung store they said that the display will have to be changed and its cost will be around 8000-9000. Why are you charging us for the software update done by Samsung? Then why do you come to update problematic software? You have a team for software testing. After verifying everything, it will be given to the customer please update it", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21296165", "author": "cs_member10", "published": "2025-12-27T03:18:56+00:00", "subject": "Re: Green Line Issue on Galaxy F54 5G &amp; Protest Against Software-Induced Defects", "text": "Dear Samsung Member,\n Greetings from Samsung Customer Support!\n We have highlighted your concern to the dedicated team for further discussion on the case. They will contact you as soon as possible. You are our valued customer and we appreciate your patience in this regard. We assure to provide you with the resolution as per the Samsung guidelines.\n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21552070", "author": "SarfarajAlam r Support!\n As per your concern, we would like to inform you that the latest software update has been developed to enhance both the performance and stability of your smartphone. This update has undergone thorough testing at various stages to ensure reliability.\n While we acknowledge that issues can arise due to individual usage patterns and other factors, we want to assure you that our dedicated customer support team is always here to assist you in resolving any concerns that may occur post-update.\n We encourage you to proceed with the update confidently, knowing that we are committed to providing help and support if needed as per policies.\n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20835913", "author": "chintan2304", "published": "2025-10-14T07:40:45+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "Nope", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20836443", "author": "ram_ram", "published": "2025-10-14T08:29:16+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "Don't update software lot of Green line problem can't get free replacement of display from Samsung", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20891850", "author": "Members_F93PQO4", "published": "2025-10-22T09:31:48+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "Yes, I use S23 and I got this green line right after the update to One UI 8 yesterday (21-10-25).\n I have a pink line 2 months ago after an update which was very thin and light which was ignorable and fortunately i didn't replaced at that time.\n But this time it is thick and bright green line which irritates the eye.\n I am just thinking what is the point of replacing the screen even after if i face this issue after a future update.", "source": "comment", "kudos": 2, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21006142", "author": "Members_Y8Ae3tu", "published": "2025-11-07T05:41:49+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "Yes, after updating to One UI 8.0 a green line is displaying on screen and Samsung quoting that your phone is not under warranty. If Samsung promising software and security updates for 5 to 7 years and the same after updating, customer facing issues means it's whose responsibility simply saying your phone is not under warranty.  Any issues persisting till software updates period, especially ussues causing after updates should be responsible by Samsung and the same issues should be resolved.", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21038776", "author": "chintan2304", "published": "2025-11-12T14:23:43+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "No", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21042992", "author": "RechiRich", "published": "2025-11-13T07:12:28+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "Yes After receiving latest update on my M33 i started facing display issue & it's not going.Samsung should fix this.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21060396", "author": "Minhaz2332", "published": "2025-11-16T04:24:14+00:00", "subject": "Re: Anyone facing green line issue after One UI 8.0 update?", "text": "My mother has a Samsung A15 5g and it's been two weeks since the update. Till now it's going okay. However, I am hesitant of updating my phone (S23) to 8.0 . The last time I updated my phone it had a green line issue.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": o physical damage, as confirmed by the service center e-job sheet, yet Samsung charged me ₹7,500 for display replacement and is denying responsibility citing “out of warranty.” \n This is clearly a software-induced defect, not user damage. Many users are reporting similar issues after the update. I have documented all evidence: invoices, e-job sheet, call logs, and recordings. \n For visibility and escalation, I’ve tweeted about this issue publicly here:  https://x.com/ShekharSiddhar3/status/1977363405435531343?t=oiZ2eMsTNLo4yyRP4zmcTw&s=08 \n I hope Samsung acknowledges this systemic defect and investigates it for affected users. \n #GalaxyF54 #OneUI7 #GreenLineIssue #SamsungIndia #ConsumerRights", "source": "root", "kudos": 5, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20819458", "author": "RedBullRussia", "published": "2025-10-12T13:52:27+00:00", "subject": "Re: Green Line Issue on Galaxy F54 5G After One UI 7 Update – Seeking Accounta..", "text": "No point raising issue after paying.", "source": "comment", "kudos": 2, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20819996", "author": "Tech_Addicted_Subho", "published": "2025-10-12T15:08:03+00:00", "subject": "Re: Green Line Issue on Galaxy F54 5G After One UI 7 Update – Seeking Accounta..", "text": "Always use dim screen, protect the screen to get overheated.\nDuring software update , even in normal security patch update , put the device near AC or freezer ,I know it's a funny statement , follow or not that's upto you.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20820578", "author": "krishanusamanta", "published": "2025-10-12T16:39:35+00:00", "subject": "Re: Green Line Issue on Galaxy F54 5G After One UI 7 Update – Seeking Accounta..", "text": "Same problem bro", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20836805", "author": "cs_member10", "published": " xy F54", "text": "Bro ppl with S series are denied free replacement due to scratches some models aren't even covered, forget about free replacement buy go buy another device.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20797105", "author": "DOS7", "published": "2025-10-09T13:45:25+00:00", "subject": "Re: Duplicity in Samsung Policy - Green Line Display Issue on Galaxy F54", "text": "I agree.\nBut letting them follow such arbitrary, high-handed policy will only emboldened them to fraud/suppress the customers.\nAtleast we can together voice our concern, inform and spread message of such dubious policy of so called \"Tech giant\" or unite to file a class action case against them", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20798117", "author": "ram_ram", "published": "2025-10-09T15:36:23+00:00", "subject": "Re: Duplicity in Samsung Policy - Green Line Display Issue on Galaxy F54", "text": "Don't pay for display as Green line appear again", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20802270", "author": "cs_member10", "published": "2025-10-10T06:29:54+00:00", "subject": "Re: Duplicity in Samsung Policy - Green Line Display Issue on Galaxy F54", "text": "Dear Samsung Member,\n Greetings from Samsung Customer Support!\n We have checked and confirmed that your concern has already been highlighted to our dedicated team. You will receive an update from them shortly.\n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}], "views": 530}, {"url": "https://r2.community.samsung.com/t5/in-community-sp-gs/Re%3A%20Samsung%27s%20Extended%20Green%20Line%20Screen%20Replacement/td-p/20779434", "domain": "r2.community.samsung.com", "group": "r2.community.samsung.com / in-community-sp-gs", "thread_id": "19040068", "title": "Samsung's Extended Green Line Screen Replacement", "topic_group": "Green Line Issue", "fetched_at_utc": "2026-03-26T18:57:16.719053+00:00", "messages": [{"id": "19040068", "author": "솜나스", "published": "2025-04-19T10:36:43+00:00", "subject": "Samsung's Extended Green Line Screen Replacement", "text": "Green Line Issue and Samsung's Response \n • SAMSUNG \n • Samsung extends free screen replacement for Green line issue until September 2025 \n • Many Samsung smartphone users have reported a green line appearing on their screens. \n • This issue has been seen on several Galaxy phones, and recently appeared on flagship models. \n • For that, Samsung has extended its one-time free screen replacement program for green line-affected Galaxy S21 and Galaxy S22 Ultra smartphones. \n Extended Warranty Details \n • A well-known tipster has shared that Samsung’s free screen replacement is now available for Galaxy S21 and S22 Ultra. \n • This policy was earlier valid until December 2024 for some devices but has now been extended to September , 2025. \n Causes of the Green Line Issue \n • The green line issue reportedly appears after software updates, though it hasn’t been confirmed whether updates are the main cause. \n • In many cases, users say the green line appeared without any updates at all. \n Eligibility and Further Information \n • Samsung hasn’t shared the full list of phones that are eligible for this policy for affected green line devices. \n Samsung's Free Screen Replacement \n • But it is expected that other flagship models launched after the Galaxy S21 series may also be covered under this policy. \n • This offer is for users in India and is available just once per phone. \n • If your phone is affected, you can visit a Samsung service center and get the screen replaced for free. \n Other Brands' Responses \n • Notably, Samsung is not the only company facing this issue. \n • OnePlus is also offering free screen replacements for their phones with the green line problem. \n • On the other hand, Google Pixel users also face the same issue, but Google only gives free repairs for its newest models. \n Call to Action \n • your Galaxy S21 or S22 Ultra has a green line on the screen, don’t wait. \n • Visit a Samsung service center and make use of this free replacement policy before the offer ends on September 2025.", "source": "root", "kudos": 23, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19040132", "author": "ghhhhjhjhjhjjj", "published": "2025-04-19T10:40:24+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Bro from when is September is having 31 days 🤡", "source": "comment", "kudos": 2, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19040399", "author": "Janmajaya123", "published": "2025-04-19T11:00:03+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Samsung users, we need your voice!\nYou also suffering from any issues that you have? You're not alone!\nLike, comment & support this post to make Samsung listen!\nClick now: https://r2.community.samsung.com/t5/Galaxy-A/Samsung-s-Response-Isn-t-Enough-Look-What-They-Said/td-p/19020680?src=ShareByUserCM", "source": "comment", "kudos": 3, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19041390", "author": "Nis14", "published": "2025-04-19T12:23:22+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "I have lost my original bill, can I get free replacement of screen?", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19043911", "author": "Sohamroy", "published": "2025-04-19T15:49:54+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "I am having green line for my s22 ultra today", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19061838", "author": "Adarsh890", "published": "2025-04-21T00:24:19+00:00", "subjec n for customers who are facing this issue for the first time after the deadline.\nKindly share the official guidance on this.\nThank you", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21381386", "author": "Vibh821", "published": "2026-01-11T07:56:45+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Hello Samsung Team,\nI am using a Samsung Galaxy S21 FE. I am experiencing the green line display issue for the first time, and it appeared two days ago.\nI understand that Samsung offered a free display replacement program until 31st December 2025. Unfortunately, this issue appeared after the deadline, and I was unable to avail the free replacement.\nI would like to know:\nWhether there are any plans to extend the free display replacement program in 2026, or\nIf Samsung can provide any support or exception for customers who are facing this issue for the first time after the deadline.\nKindly share the official guidance on this.\nThank you", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21408754", "author": "vishnuvii", "published": "2026-01-16T01:35:48+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "I don't have purchase invoice", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21416936", "author": "honnurali", "published": "2026-01-17T15:30:19+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Hi my samsung s21plus have green line issue", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21417597", "author": "naveen02", "published": "2026-01-17T17:41:21+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "I have getting the green lines issue my phone S 21 Fe purchase date 23/09/2022 what i can do, please advise 🙏", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21430351", "author": "pranjitroy", "published": "2026-01-19T14:58:00+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Pink line issue s23 model", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21437310", "author": "Members_PZ8Iowd", "published": "2026-01-20T12:45:51+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Dear Samsung Customer Support Team,\n I am writing to formally escalate an issue regarding my Samsung Galaxy S21 FE, which was diagnosed with the well-known green line display issue and was approved for a free display replacement by an authorized Samsung Service Center.\n After I reported the green line issue, the service center inspected my device and confirmed that it was eligible for a free display replacement. Based on this inspection and approval, the replacement display part was ordered. I was clearly instructed to submit my phone only after the arrival of the part, and accordingly, the device remained with me during this waiting period.\n However, when I visited the service center to submit my phone after being informed that the part had arrived, I was unexpectedly informed that the free replacement would not be honored, citing a minor chip on the phone’s frame surface.\n I would like to bring the following points to your attention:\n 1. The green line issue is a known AMOLED panel defect and is completely unrelated to minor cosmetic damage on the frame.\n 2. The alleged frame chip was never documented or communicated during the initial inspection when the free replacement was approved.\n 3. The device was kept with me only as per the service center’s instructions, after the approval had already been granted.\n 4. A minor cosmetic frame chip does not technically affect display functionality nor does it invalidate a display replacement, especially for a pre-approved green line defect.\n 5. Withdrawing an already approved free service without prior inspection records or written justification is unfair and unacceptable.\n I respectfully request Samsung to review this matter urgently and honor the originally approved free display replacement for the green line issue.\n I trust Samsung will address this issue fairly and uphold its customer service standards.I look forward to a prompt resolution.\n Regards,\n Samsung Galaxy S21 FE", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21447732", "author": "Abhishek4u", "published": "2026-01-22T12:19:10+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "I got green line issue again on my galaxy s21fe exynos version.\nActually the display was changed by the Samsung Service centre but within 1 year I got again green line issue without any external damage.\nWhen I visited service centre they denied to replace my display.\nIts a huge same for Samsung which is not providing or taking any action for customers, Like Oneplus has provided lifetime screen replacement\nThen why Samsung is not doing it.\nI will never gonna purchase any Samsung phones ever.\nIt was my huge mistake", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21477925", "author": "ashutoshkrs", "published": "2026-01-27T15:03:49+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "Screen replacement for green screen line offers till now", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "21514634", "author": "shivme", "published": "2026-02-03T06:44:09+00:00", "subject": "Re: Samsung's Extended Green Line Screen Replacement", "text": "I got green line on screen after software update", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}], "views": 30513}, {"url" ou visit a Samsung-authorized service center to have your device inspected by the technical team. They will provide you with detailed information after physically examining the device.\n Please note that if repairs are made and parts are replaced during the service on a chargeable basis, you will receive a 3-month warranty on the replaced parts.\n You can locate your nearest service centre with this given link: https://www.samsung.com/in/support/service-center/ \n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20479944", "author": "BiRdMaN", "published": "2025-09-01T14:54:32+00:00", "subject": "Re: Green Line Issue on Samsung F54 – Request for Official Solution", "text": "Samsung offers free screen replacements for some Galaxy phones under specific circumstances, primarily related to a known green line display issue.\nConditions\n(e.g., 3 years from purchase) and without physical or water damage.\nLimited to certain models and regions, including the Galaxy S21 series, S21 FE, S22 Ultra, and extended to S23 as well due to the growing number of users facing the green line issue on their devices.\nThe offer is valid until 30th September 2025\nIf you find this helpful, I'd appreciate it if you could ACCEPT it as a SOLUTION. Thank you 😊 \n https://www.sammyfans.com/2025/08/14/samsung-galaxy-s23-ultra-green-line-display-repair-india/", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20496222", "author": "AkashManjre", "published": "2025-09-03T14:09:30+00:00", "subject": "Re: Green Line Issue on Samsung F54 – Request for Official Solution", "text": "Can anyone share the screenshot of this issue which you face recently with this device", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20545504", "author": "AvinVish", "published": "2025-09-09T21:06:42+00:00", "subject": "Re: Gree ": "Re: Green line issue", "text": "Accept solutions Click three dot 🪛 ✅ ️ 🙏", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}], "views": 208}, {"url": "https://r2.community.samsung.com/t5/Galaxy-F/Green-line-updates-for-F54/td-p/20386514", "domain": "r2.community.samsung.com", "group": "r2.community.samsung.com / Galaxy-F", "thread_id": "20386514", "title": "Green line updates for F54", "topic_group": "Green Line Issue", "fetched_at_utc": "2026-03-26T18:57:35.243704+00:00", "messages": [{"id": "20386514", "author": "the_aghori", "published": "2025-08-20T05:52:11+00:00", "subject": "Green line updates for F54", "text": "My Samsung phone has developed green lines on the display after a software update. On inspection, I found that only one LDI strip near the USB port shows a faint pink tint, while all other LDIs are perfectly white. The phone has never been exposed to water, rain, or liquid spills. There are no corrosion marks on the USB port or inside the device. Samsung LDIs are known to be overly sensitive and may react to heat from charging or normal humidity, which could explain this faint discoloration. Therefore, this cannot be considered genuine water damage, and my case should not be rejected on that basis. \n https://xdaforums.com/t/tip-keep-your-ldi-from-voiding-your-warranty-due-to-false-water-indications.1198017/?utm_source=perplexity \n https://www.reddit.com/r/samsung/comments/vxp5dd/can_we_please_discuss_samsungs_massively_faulty/?utm_source=perplexity \n My single advice to everyone is please get rid of the company the doesnot value customers...", "source": "root", "kudos": 3, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20386538", "author": "BiRdMaN", "published": "2025-08-20T05:58:05+00:00", "subject": "Re: Green line updates for F54", "text": "ScAMSUNG", "source": "comment", "kudos": 2, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20388258", "author": "cs_member10", "published": "2025-08-20T10:47:43+00:00", "subject": "Re: Green line updates for F54", "text": "Dear Samsung Member,\n Greetings from Samsung Customer Support!\n We strive to provide an impeccable product experience, and we wanted to share more about our commitment to quality. Our products undergo rigorous quality checks that are recognized globally.\n We understand that issues may arise due to various factors, and we want to reassure you that our service team is always available to help resolve any concerns you may encounter.\n If you are facing line issues on your device's display, we encourage you to visit any Samsung authorized service center. Our technician team will inspect the device to provide the necessary assistance.\n Rest assured, we are dedicated to delivering best-in-class services, and all repairs are performed by trained and certified engineers of Samsung. Additionally, all parts used will be genuine to ensure the highest quality of service. You can locate your nearest service centre with this given link: https://www.samsung.com/in/support/service-center/ \n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20388303", "author": "anisha_nair", "published": "2025-08-20T10:53:24+00:00", "subject": "Re: Green line updates for F54", "text": "So that's what they said to your complaint? Just straight up made new excuses?🫠 will you be going to consumer court then?", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}], "views": 743}, {"url": "https://r2.community.samsung.com/t5/GalaxyF/Repeated%20Screen%20%26amp%3B%20Touch%20Issues%20After%20Software%20Update%20on%20Samsung%20Devices/td-p/20344940", "domain": "r2.community.samsung.com", "group": "r2.community.samsung.com / GalaxyF", "thread_id": "20344940", "title": "Repeated Screen &amp; Touch Issues After Software Update on Samsung Devices", "topic_group": "Pink Line Issue" mment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20795895", "author": "DOS7", "published": "2025-10-09T10:46:45+00:00", "subject": "Re: Case Filed Against Samsung in National Consumer Court Over Green Line Issue", "text": "They just follow the disciminatory policy against all other phone user barring these model in chat. Such is the Duplicity of this brand", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "20859014", "author": "Members_IFsjond", "published": "2025-10-17T11:23:41+00:00", "subject": "Re: Case Filed Against Samsung in National Consumer Court Over Green Line Issue", "text": "I’m writing this post to make other customers aware of the kind of experience I’ve had with my Samsung Z Fold 7, and the complete lack of accountability I’ve faced from the brand.\n I purchased the Z Fold 7 (₹1.62L) earlier this month, and within just a few days, I noticed an issue with the touchscreen on the cover display. I immediately visited the Samsung Service Center, where I was told it would take about a week to get a replacement under the DOA (Dead on Arrival) policy.\n Since then, it’s been over 11 days — and despite raising multiple escalations, including to the CEO office, the issue is still not resolved.\nThe service center even confirmed twice on Samsung’s recorded line that my device would be replaced.\n But when I was finally told yesterday that I’d receive the replacement “in a few hours,” I was suddenly informed that the DOA has been denied due to a small dent on the frame — something I was never even aware of.\nThe phone was used for only 4–5 days, always in a protective cover, and has been lying with the service center for over 9–10 days.\n This reasoning is unacceptable.\nA minor cosmetic mark cannot be used to deny replacement for a verified manufacturing defect.\n This entire process has cost me time, energy, and mental peace. I’ve exhausted every possible escalation route  "author_avatar": null, "url": null}, {"id": "19878341", "author": "Meyju", "published": "2025-06-20T06:15:37+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "How should i wait man..although you knw that,,now a days everyones daily life and professional life also depend on smart phones..Samsung have to fix this problem ASAP", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19878495", "author": "BiRdMaN", "published": "2025-06-20T06:30:51+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "Send an error report along with log files to customer support through this members app and Samsung will fix it in the next update\nIf you find this helpful please mark it as Solution Thanks 😊", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19878506", "author": "BiRdMaN", "published": "2025-06-20T06:31:46+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "This can be due to the phone re-optimizing itself after the update or apps needing to be optimized for the new firmware.\nAdd apps to the \"deep sleep\" list to prevent them from running in the background and draining battery.\nClear app cache to remove temporary data that can impact performance and battery usage.\nResetting battery statistics can sometimes help.\nAdjust background usage limits in Settings > Battery and device care > Battery > Background usage limits.\nChoose options like \"Put unused apps to sleep\" or \"Sleeping apps\" to restrict background activity.\nIf you find this helpful, kindly accept it as a Solution. It helps others\nTap the 3 dots on my reply and select \"Accept Solution.\" Thank you 😊", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19880634", "author": "cs_member10", "published": "2025-06-20T10:58:33+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "Dear Samsung member,\n Greetings from Samsung Customer Support!\n We regret to hear about your experience with our product. Please believe that this is not a usual occurrence.\n Please perform the below-mentioned troubleshooting steps, these may help in resolving your concerns.\n 1. Galaxy device Battery drain issue: Galaxy device Battery drainage issue: Note: Charge in one go instead of charging many times as it affects the life span of battery and battery performance.\n 1. Perform Battery Optimization: Go to Settings > Select Device Maintenance/Device Care > Optimize > Optimize all options like Battery, Storage, and Memory.\n 2. Turn off Wi-Fi, GPS, Bluetooth etc. when not in use.\n 3. Check device network fluctuation. Avoid usage in areas with low network/fluctuation.\n 4. Reduce the display brightness level or set the device to auto-brightness mode.\n 5. Adjust screen timeout settings: Go to Settings > Display > Screen timeout > Select the minimum screen timeout.\n 6. Check which application is or interface is using more battery from device care and try to update app or avoid using that app.\n 7. Close background running apps.\n 8. Turn off auto sync of e-mails, app data etc.\nOpen notification panel > Turn off auto sync option.\n 2. Galaxy device charging issue: ● We always recommend to use genuine Samsung charger for charging your device.\n ● Check your charging cable (USB cable) for physical damage such as wear and tear, bent prongs etc. If it is damaged, then kindly visit your nearest service center to get it replaced.\n ● Kindly check the charger functionality with a different device or try to charge the same device with a different charger.\n ● Check charging: If rating is 15W or above: Kindly try to charge the device in a non-inverter socket.\n ● If you using normal socket: As a safety measure Fast charging may not support, while you are using the device hence, request you to keep the device idle and check the charging performance.\nNote: Kindly open Device care from settings > tap on Battery > tap on More battery settings > Fast charging > Turn on.\n ● Kindly follow the standard charging procedure. i.e. please charge the device in switched-off condition for 10 minutes.\n ● Avoid usage of mobile phones during charging. Usage of the mobile phone when charging may cause slow charging issues. So we recommend you avoid the usage of the mobile phone while charging.\n ● Update the software if available: https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-smartphone-how-to-update-software/ \n ● You can reset your device by following the steps.\n1. Kindly create a data backup of your device via the SMART switch mobile application or http://www.samsung.com/in/support/smartswitch pc suite.\n2. Remember the Google password before resetting the device because it is required during initial setup.\n3. If you do not remember then advise to reset (Forgot password) his/her Google account.\n Path: Settings> General Management.>Reset>Temporary cloud backup or External storage backup>After backup tab on Factory data reset to reset your device to its factory default settings.\nThis will erase all data, including files and downloaded apps.\n If the issue persists, kindly report the problems with a log file. To share a log file, click on the Samsung Members Application (Open Samsung Members Application > Support> Tap on send feedback> Choose Composer> Select error report> select the appropriate issue category> Type your query and send.)\n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19882152", "author": "goodthings", "published": "2025-06-20T14:05:27+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "Kindly complaint to Samsung customer support through Samsung members app as error report also send log files along with this error report for this issue and wait for next update maybe fix it by Samsung team soon. If you like Please accept as a solution it's help to other users also, click on 3dots in my reply section and click on accept solution. Thanks.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19882155", "author": "goodthings", "published": "2025-06-20T14:05:35+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "You're welcome to here.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19888762", "author": "Meyju", "published": "2025-06-21T08:10:59+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "How long we have to wait for the updation..?", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19890521", "author": "Roopeshhv", "published": "2025-06-21T11:40:38+00:00", "subject": "Re: Charging is very slow and high battery drainage", "text": "I'm also facing slow charging issue\nAfter updating to One UI 7.0, I'm facing issues with fast/super fast charging.\nI’ve checked the charging cable, adapter (45W Samsung original), and the port — everything is fine. The only variable that changed is the software update.\nBefore the update, my phone used to charge about 2% per minute. Now it struggles to even reach 1% per 3-4 minute — charging speed has dropped by roughly 80%.\nPlease help if anyone else is facing this or knows a fix.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}], "views": 328}, {"url": "https://r2.community.samsung.com/t5/GalaxyF/samsung%20one%20ui%207%20green%20line%20issue%20-%20samsung%20f54/td-p/19870655", "domain": "r2.community.samsung.com", "group": "r2.community.samsung.com / GalaxyF", "thread_id": "19870655", "title": "samsung one ui 7 green line issue - samsung f54", "topic_group": "Green Line Issue", "fetched_at_utc": "2026-03-26T18:57:50.855792+00:00", "messages": [{"id": "19870655", "author": "the_aghori", "published": "2025-06-19T12:34:13+00:00", "subject": "samsung one ui 7 green line issue - samsung f54", "text": "Samsung promises 5 years of updates... but can't take responsibility when their update ruins your phone. After One UI 7.0, my Galaxy F54 got a green line — now two. Samsung wants ₹8000 to fix what their own update broke.", "source": "root", "kudos": 4, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19871819", "author": "ram_ram", "published": "2025-06-19T14:29:51+00:00", "subject": "Re: samsung one ui 7 green line issue - samsung f54", "text": "Samsung service center and samsung customer support don't provide free replacement send email to Samsung care try I got free replacement", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "19877739", "author": "cs_member10", "published": "2025-06-20T05:15:46+00:00", "subject": "Re: samsung one ui 7 green line issue - samsung f54", "text": "Dear Samsung Member,\n Greetings from Samsung Customer Support!\n As per your concern, we would like to inform you that the latest software update has been developed to enhance both the performance and stability of your smartphone. This update has undergone thorough testing at various stages to ensure reliability.\n We understand that issues may arise due to various factors, and we want to reassure you that our service team is always available to help resolve any concerns you may encounter.\n You have already connected with our service team, they have guided you according to Samsung policies, please be informed that charges for repair are applicable for out of warranty products.\n Rest assured, we will provide best in class services and repair is done by trained and certified engineers of Samsung. Also, all parts used will be genuine. Kindly coordinate with the service team for any further assistance regarding this matter.\n Warm Regards,\nSamsung C ll out to other supported Samsung devices in the first quarter of 2025. The first device to receive the stable One UI 7.0 update will be the Galaxy S24 lineup, most likely in late February Samsung One UI 7 Rollout Timeline: \n Samsung has not yet shared a detailed, official rollout plan for One UI. The Samsung Galaxy devices eligible for the One UI 7 update include: \n Galaxy S Series: Galaxy S24, Galaxy S23, Galaxy S22, and Galaxy S21 (including FE devices). Galaxy Z Series: Galaxy Z Fold 6, Flip 6, Fold 5, Flip 5, Fold 4, Flip 4, Fold 3, Flip 3. Galaxy A Series: Galaxy A73, A55, A54, A53, A35, A34, A33, A25, A24, A23, A15, A14, A05, A05s. Galaxy M Series: Galaxy M55, M54, M53, M35, M34, M33, M15. Galaxy F Series: Galaxy F55, F54, F34, F15. Galaxy Tab Series: Galaxy Tab S9, S9+, Ultra, FE, FE+, Tab S8, S8+, Ultra, Tab A9, A9+, Tab S6 Lite (2024). NOTE : This list is prepared based on Samsung’s software update policy and the devices that launched with Android 13 or later, which are generally guaranteed to receive further updates including One UI 7. However, for the most accurate and up-to-date list, always refer to Samsung’s official announcements or their software update policy details around the time of the update’s release.", "source": "root", "kudos": 13, "is_solution": false, "author_avatar": null, "url": null}, {"id": "18275267", "author": "naviaz", "published": "2025-02-13T13:45:17+00:00", "subject": "Re: Samsung One UI 7 release date: Here’s when you can expect the stable update?", "text": "ਓ ਛੱਡ ਯਾਰਾ ਕਿਹੜੀ ui7 😜", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "18282870", "author": "Parth_95", "published": "2025-02-14T08:31:44+00:00", "subject": "Re: Samsung One UI 7 release date: Here’s when you can expect the stable update?", "text": "Samsung se update nhi ho payega", "source": "comment", "kudos": 2, "is_solution": false, "author_avatar": null, "url": null}, {"id": "18283332", "author": "avd", "published iod of two hours, they have added new points in the same job sheet to avoid a free screen replacement. Very smart tactics to steal and exploit the customers. \n To my horror, apart from the display line issue, I now have missing screws on my phone. Having submitted a good quality phone to the service Centre, I get a treatment for gaslighting me and stealing my original Samsung parts. I can never prove this, and exploiting this, everyone has been trying to make me falsely admit that I HAD A LOCAL SERVICE done on my phone. \n WHEN THERE ARE AUTHORISED SERVICE CENTERS WHY WILL I GO TO A LOCAL STORE. MY PHONE HAS HAD NO ISSUES BEFORE THE WHITE LINES APPEARED. \n The customer service had already informed me on call that after my issue has been escalated, I will get a call from the team and if I miss the call I cant call back. So, I am supposed to attach myself to my phone to get a call and if god forbid I miss the call I have to wait for 6 hours.  \n Sept 28: 3:40 PM IST , I got a call from the Escalation Team. I was promised a call between 12 - 12:30 PM IST. \n They also repeatedly mentioned that I have been to a local repair shop which has resulted in these missing parts. This is absolutely a false accusation to avoid for a free screen replacement. What has this anything to do with Screen? (POLICY POLICY POLICY). \n I was put on a conference call with the service repair technician even after I said NO . This was the same service center which lied to me about the offer date, mentioning it was only valid till Sept 20, 2024. \n After multiple attempts of emailing and calling, I was informed the matter will be looked into (Oct 1) and to wait for 2 days. 7  days went flying and I never did receive a call/text/email. Only after I had again raised issues with customer support, my case was highlighted. \n The minimum decency of communication doesn’t exist in the escalation team , I wonder how other cases are handled. The customer has to go through all this harassment and false allegations to receive a call on Oct 9th : Ma'am we can't do anything, when you had submitted your phone to a local store, it resulted in missing parts. You have to pay 11k for a replacement. (The amount of gaslighting one company can do to avoid charges for damages they themselves created). \n When the issue is clearly due to the software update , why should the customer pay for the screen replacement? \n They have a screen replacement offer for this model because they know this is a common issue. \n All I heard was: Sorry for the inconvenience caused. More than 15 days, I do not have my phone . I have received no resolution, I have lost business leading to mental harassment. \n I am attaching the two PDFs (Job sheet) below for reference and alert for scamming customers. REMEMBER TO LOOK AT THE TIME STAMP..!! \n There's no reason I should be bearing this cost. \n JOB SHEET at 7:22 PM IST JOB SHEET at 5:54 PM IST", "source": "root", "kudos": 13, "is_solution": false, "author_avatar": null, "url": null}, {"id": "17220022", "author": "Prashantbgh", "published": "2024-10-10T21:36:24+00:00", "subject": "Re: S21 fe White line on Display Issue, Refusal to replace screen within offer..", "text": "Samsung listen to your valuable customer carefully. Email to Samsung CEO service center.", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "17221439", "author": "KunalBisani", "published": "2024-10-11T06:07:32+00:00", "subject": "Re: S21 fe White line on Display Issue, Refusal to replace screen within offer..", "text": "Did you get any resolution?\nCause I'm facing the same thing", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "17228248", "author": "NibinY", "published": "2024-10-12T11:41:30+00:00", "subject": "Re: S21 fe White line on Display Issue, Refusal to replace screen within offer..", "text": "Post on Twitter and tag Samsung Mobile, Samsung India, and Samsung profiles.  "subject": "Re: Green line after update to one ui 6.1", "text": "Kindly complaint to Samsung customer support through Samsung Members App as error report also send log files Along with this error report for this issue. Then go to service center for replace/repair it's. If you like please accept as a solution it's help to others users also,click on 3dots in my reply section and click on accept solution. Thanks.", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16172069", "author": "goodthings", "published": "2024-05-18T09:11:50+00:00", "subject": "Re: Green line after update to one ui 6.1", "text": "Your's most welcome to here.", "source": "comment", "kudos": 1, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16177745", "author": "cs_member10", "published": "2024-05-19T05:22:27+00:00", "subject": "Re: Green line after update to one ui 6.1", "text": "Dear Samsung Member,\n Greetings from Samsung Customer Support!\n As per your query, we would request you to kindly perform the following steps to resolve your issue.\n Kindly restart your device once: To power off through Quick settings, swipe down from the top of the screen. Tap the Power icon in the upper right of the screen (next to the Settings icon), and then tap Power off.\n Update the software if available: https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-smartphone-how-to-update-software/ \n Reset your device: https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-mobile-how-to-perform-a-factory-reset/ \n In case the issue still occurs, please visit the service center for a physical inspection of your device. You can locate your nearest service center with this given link: https://www.samsung.com/in/support/service-center/ \n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16210873", "author": "SahedAhmed26", "published": "2 05-19T05:53:49+00:00", "subject": "Re: Camera quality of samsung", "text": "Dear Samsung Member,\n Greetings from Samsung Customer Support!\n As per your concern, we would request you to kindly perform the following steps to resolve your issue. However, we are taking your valuable feedback regarding this.\n Reset the camera settings: Home screen tap on Camera>Settings>Reset settings>Reset.\nClear camera application data: Apps>Camera>Storage>Clear Data\nCheck app cache: Settings > Apps > Camera> Storage > Clear Cache.\n Update the software if available: https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-smartphone-how-to-update-software/ \n Reset your device: https://www.samsung.com/in/support/mobile-devices/samsung-galaxy-mobile-how-to-perform-a-factory-reset/ \n If the issue persists, kindly report the problems with a log file. To share a log file, click on the Samsung Members Application (Open Samsung Members Application > Support> Tap on error report > Type your query > Send).\n Warm Regards,\nSamsung Customer Support", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": null}], "views": 1774}, {"url": "https://r2.community.samsung.com/t5/in-community-sp-ga/Samsung%20Galaxy%20One%20Ui%207%20update./td-p/16067835", "domain": "r2.community.samsung.com", "group": "r2.community.samsung.com / in-community-sp-ga", "thread_id": "16067835", "title": "Samsung Galaxy One Ui 7 update.", "topic_group": "Update Related", "fetched_at_utc": "2026-03-26T18:59:01.393230+00:00", "messages": [{"id": "16067835", "author": "kbipin34", "published": "2024-05-03T10:13:17+00:00", "subject": "Samsung Galaxy One Ui 7 update.", "text": "Samsung Galaxy One UI 7 Android 15 update Google is already testing the next version of its operating system – Android 15. A few developer preview builds are already out, and the new OS is now going through the beta testing phase, which will last until July. While the stable Android 15 release is months away, Samsung Galaxy owners are curious to know about its release date, the new features it’ll bring, and the eligible devices for the One UI 7 upgrade. \n In this post, you’ll know everything about the Android 15-based One UI 7 update. \n Samsung Galaxy One UI 7 (Android 15) Eligible Devices List [Galaxy S series] \n Galaxy S24 Ultra Galaxy S24+ Galaxy S24 Galaxy S23 Ultra Galaxy S23+ Galaxy S23 Galaxy S23 FE Galaxy S22 Ultra Galaxy S22+ Galaxy S22 Galaxy S21 Ultra Galaxy S21+ Galaxy S21 Galaxy S21 FE \n [Galaxy Z series] \n Galaxy Z Fold 5 Galaxy Z Flip 5 Galaxy Z Fold 4 Galaxy Z Flip 4 Galaxy Z Fold 3 Galaxy Z Flip 3 [Galaxy Tab series] \n Galaxy Tab S9 Ultra Galaxy Tab S9+ Galaxy Tab S9 Galaxy Tab S9 FE+ Galaxy Tab S9 FE Galaxy Tab S8 Ultra Galaxy Tab S8+ Galaxy Tab S8 Galaxy Tab S6 Lite (2024) Galaxy Tab A9+ Galaxy Tab A9 Galaxy Tab Active 5 [Galaxy A series] \n Galaxy A73 Galaxy A72 Galaxy A55 Galaxy A54 Galaxy A35 Galaxy A34 Galaxy A33 Galaxy A25 Galaxy A24 Galaxy A23 Galaxy A15 (LTE) Galaxy A15 (5G) Galaxy A14 (LTE) Galaxy A14 (5G) Galaxy A05s [Galaxy M series] \n Galaxy M55 Galaxy M54 Galaxy M34 Galaxy M53 Galaxy M33 Galaxy M15 [Galaxy F series] \n Galaxy F55 Galaxy F54 Galaxy F34 Galaxy F15 [Galaxy Xcover series] \n Galaxy Xcover 7 This is not the official list, but shouldn’t be a lot different than that. We have into account Samsung’s software update policy and the past updates rollout to prepare this list. \n Samsung provides at least two Android updates to all Galaxy devices. Hence, all those launched with Android 13 or Android 14 will get the Android 15-based One UI 7 update. \n The brand offers four years of OS upgrades to flagships and mid-range phones. Since all Galaxy devices under this promise launched with Android 11 or later, they will also be upgraded to Android 15. \n Again, this is not the final list. Samsung might upgrade more Galaxy devices to One UI 7. We’ll keep updating the list based on the latest information. \n Android 15 Release Timeline Every new Android OS goes through multiple development and testing phases before the stable build arrives for the public. The developer preview phase is done for Android 15, and it is now in its beta phase of testing, which will last until July. \n Android 15 timeline Android 15 release timeline Once the beta phase passes through, Android 15 will reach platform stability where bugs and problems are resolved to prepare for a stable release. \n Google hasn’t revealed when the stable Android 15 builds will be released, but it’s likely to be in October 2024, when the company will also announce the Pixel 9 series. In the same month last year, Google announced the stable release of Android 14. \n Google Pixels will be the first in line to receive the Android 15 update. But when will it start rolling out to Samsung? After the stable release, Samsung takes time to blend its custom skin – One UI – with the latest Android OS. \n Samsung is among the Android brands to offer beta builds for users to get an early look at the new software. Last year, the brand started releasing beta builds of Android 14 in August, and we are expecting the same with Android 15. As always, newer Galaxy S-series phones will be the first to get an early taste of Android 15 via the beta releases. \n What’s New in Android 15? These features have been announced or discovered in Android 15 beta builds. \n Satellite Connectivity Support \n Ever since Apple released satellite connectivity for iPhones, Android users have been desperately waiting for it. Finally, it’s coming as a part of Android 15. Apps can use APIs to detect when a device is connected to a satellite. \n Android 15 supports satellite connectivity for SMS apps and RCS apps for sending and receiving messages. This means satellite connectivity will not be limited to emergency uses only. \n Partial Screen Sharing \n If you share or record the screen in Android 14 or older versions, it will capture everything displayed on the screen. Android 15 makes it better by adding support for sharing or recording a single app rather than the entire screen. \n Notification Cooldown \n Too many successive notifications from a single app can be annoying, which Google has tried to resolve with the “Notification cooldown” feature. This feature lowers the volume of successive notifications coming from the same app. \n Sensitive Notifications \n Android 15 adds a strong layer of protection to your OTPs. The new sensitive notification feature will prevent malicious Android apps from reading your OTPs. \n OTP fraud has been on the rise in recent years, and hence this feature could save people their hard-earned money if implemented correctly. \n High-Quality Webcam \n Android 14 QPR 1 for Google Pixel phones added a feature to use your Android phone as a webcam for a PC, but the output quality was basic. Android 15 resolves this problem by adding a high-quality webcam mode that disables power optimizations. \n This feature has been spotted in Android 15 Developer Preview 2, where a new “HQ” symbol appears in the webcam preview. As it disables power optimizations, expect some battery drain. \n Universal Keyboard Vibration Control \n Android 15 will let you universally disable keyboard vibration. The new “keyboard vibration” toggle, when turned off, overrides individual keyboard apps’ settings. However, you will be able to control the haptics of each keyboard app by disabling it. \n These are some notable additions to Android 15 that have been discovered so far. \n What are your expectations with Android 15? And which Galaxy device do you have? Please share your thoughts in the comments below.", "source": "root", "kudos": 34, "is_solution": false, "author_avatar": null, "url": null}, {"id": "16069539", "author": "imjoker2611", "published": "2024-05-03T15:26:33+00:00", "subject": "Re: Samsung Galaxy One Ui 7 update.", "text": "Won't come to M53", "source": "comment", "kudos": 0, "is_solution": false, "author_avatar": null, "url": nu     const root = document.getElementById("root");
    const stats = document.getElementById("stats");
    const q = document.getElementById("q");
    const topicFilter = document.getElementById("topicFilter");
    const sortBy = document.getElementById("sortBy");
    const topicRow = document.getElementById("topicRow");

    const statItems = [
      ["Threads", DATA.total_threads || 0],
      ["Posts + Replies", DATA.total_messages || 0],
      ["Replies", DATA.total_replies || 0],
      ["Total Views", DATA.total_views || 0],
    ];
    stats.innerHTML = statItems.map(([k, v]) => `<div class="stat"><b>${v >= 1000 ? (v/1000).toFixed(1) + 'k' : esc(v)}</b>${esc(k)}</div>`).join("");

    const topics = Object.keys(DATA.topics || {}).sort((a, b) => a.localeCompare(b));
    topicFilter.innerHTML = `<option value="">All Topics</option>` +
      topics.map(t => `<option value="${escAttr(t)}">${esc(t)} (${DATA.topics[t] || 0})</option>`).join("");
    topicRow.innerHTML = topics.map(t => `<span class="topic-chip">${esc(t)}: ${DATA.topics[t] || 0}</span>`).join("");

    function toTs(v) {
      const t = Date.parse(v || "");
      return Number.isNaN(t) ? 0 : t;
    }

    function render() {
      const query = (q.value || "").trim().toLowerCase();
      const topic = topicFilter.value;
      const sorter = sortBy.value;

      let items = (DATA.threads || []).slice();
      if (topic) items = items.filter(t => (t.topic_group || "") === topic);
      if (query) {
        items = items.filter(t => {
          const corpus = [
            t.title || "",
            t.topic_group || "",
            t.group || "",
            t.thread_id || "",
            t.url || "",
            ...(t.messages || []).map(m => (m.author || "") + " " + (m.subject || "") + " " + (m.text || ""))
          ].join(" ").toLowerCase();
          return corpus.includes(query);
        });
      }

      items.sort((a, b) => {
        const ar = Math.max((a.messages || []).length - 1, 0);
        const br = Math.max((b.messages || []).length - 1, 0);
        const at = toTs((a.messages || [])[0]?.published);
        const bt = toTs((b.messages || [])[0]?.published);
        if (sorter === "new_desc") return bt - at;
        if (sorter === "old_asc") return at - bt;
        return br - ar || bt - at;
      });

      if (!items.length) {
        root.innerHTML = `<div class="empty">No threads match the current filter.</div>`;
        return;
      }

      root.innerHTML = items.map((t, idx) => renderThread(t, idx)).join("");
    }

    function renderThread(t, idx) {
      const msgs = t.messages || [];
      const rootPost = msgs.find(m => m.source === "root") || msgs[0];
      const replies = msgs.filter(m => m !== rootPost);
      const openAttr = idx < 2 ? " open" : "";

      const postHtml = rootPost ? renderMessage(rootPost, "Original Complaint", "post") : `<div class="empty">Original post text unavailable.</div>`;

      const replyHtml = replies.length
        ? replies.map((r, i) => renderMessage(r, `Reply ${i + 1}`, "reply")).join("")
        : `<div class="empty">No replies found for this thread.</div>`;

      return `
        <section class="thread">
          <header class="thread-head">
            <h2 class="title">${esc(t.title || "Untitled")}</h2>
            <div class="meta">
              <span class="badge badge-alert">${esc(t.topic_group || "Issue")}</span>
              <span class="badge badge-brand">${replies.length} replies</span>
              <span class="view-count" title="Total thread views">👁️ ${esc(t.views || 0)}</span>
              <span>${esc(t.group || "Unknown group")}</span>
              <span>ID: ${esc(t.thread_id || "N/A")}</span>
              <span><a href="${escAttr(t.url || "#")}" target="_blank" rel="noopener noreferrer">Source Thread ↗</a></span>
            </div>
          </header>
          <div class="body">
            ${postHtml}
            <details class="replies"${openAttr}>
              <summary>Replies (${replies.length}) - click to show/hide</summary>
              <div class="reply-list">${replyHtml}</div>
            </details>
          </div>
        </section>
      `;
    }

    function renderMessage(m, label, className) {
      const solutionHtml = m.is_solution ? `<span class="solution-mark">✅ Solution</span>` : "";
      const avatarHtml = m.author_avatar ? `<img class="avatar" src="${escAttr(m.author_avatar)}" alt="" loading="lazy">` : `<div class="avatar"></div>`;
      const kudosHtml = m.kudos > 0 ? `<span class="kudos" title="${m.kudos} kudos">❤️ ${m.kudos}</span>` : "";
      const permalinkHtml = m.url ? `<a href="${escAttr(m.url)}" target="_blank" class="muted" style="font-size:10px; margin-left:auto;">permalink ↗</a>` : "";

      return `
        <article class="${className}">
          <div class="post-label">${esc(label)} ${solutionHtml}</div>
          <div class="msg-header">
            ${avatarHtml}
            <div class="msg-meta" style="margin-bottom:0">
              <b>${esc(m.author || "Unknown")}</b> | ${esc(m.published || "Unknown time")}
              ${kudosHtml}
            </div>
            ${permalinkHtml}
          </div>
          <div class="msg-text">${esc(m.text || "")}</div>
        </article>
      `;
    }

    function esc(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escAttr(v) {
      return esc(v).replace(/`/g, "");
    }

    q.addEventListener("input", render);
    topicFilter.addEventListener("change", render);
    sortBy.addEventListener("change", render);
    render();
  </script>
</body>
</html>
